---
- name: Install bastion packages
  ansible.builtin.apt:
    name:
      - fail2ban
      - auditd
      - tmux
    state: present
  tags: [bastion, packages]

- name: Deploy SSH banner
  ansible.builtin.copy:
    dest: /etc/ssh/banner
    content: |
      ****************************************************************
      *  CIA Bastion Host - Site 2                                   *
      *  Authorized access only. All sessions are logged.            *
      ****************************************************************
    mode: "0644"
  tags: [bastion, ssh]

- name: Configure SSH for bastion
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    mode: "0644"
    validate: "sshd -t -f %s"
  notify: Restart sshd
  tags: [bastion, ssh]

- name: Configure fail2ban for SSH
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: Restart fail2ban
  tags: [bastion, fail2ban]

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
  tags: [bastion, fail2ban]

- name: Configure auditd rules for session logging
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/bastion.rules
    content: |
      -w /var/log/auth.log -p wa -k auth_log
      -a always,exit -F arch=b64 -S execve -k command_exec
    mode: "0644"
  notify: Restart auditd
  tags: [bastion, auditd]

- name: Enable and start auditd
  ansible.builtin.service:
    name: auditd
    state: started
    enabled: true
  tags: [bastion, auditd]
