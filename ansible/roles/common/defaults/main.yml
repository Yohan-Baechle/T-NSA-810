---
common_packages:
  - curl
  - wget
  - vim
  - htop
  - unattended-upgrades
  - apt-transport-https
  - ca-certificates
  - gnupg
  - rsyslog

common_ssh_port: 22
common_ssh_permit_root_login: "no"
common_ssh_password_authentication: "no"
common_ssh_max_auth_tries: 3
# Le forwarding SSH est désactivé par défaut (durcissement). Le bastion doit
# l'autoriser (c'est sa fonction : rebondir vers les VM internes) - il met
# cette variable à "yes" dans son host_vars.
common_ssh_allow_tcp_forwarding: "no"

common_ntp_timezone: Europe/Paris

# Nom de l'interface LAN des VM (vérifier avec "ip link show").
common_network_interface: enp6s18
