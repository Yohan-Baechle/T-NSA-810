---
# Accès SSH :
#   - bastion-s2 : seule entrée publique (alias ~/.ssh/config "cia-bastion",
#                  port-forward WAN:2222 -> :22)
#   - autres VM  : non exposées, atteintes en rebond (ProxyJump cia-bastion)
all:
  children:
    site1:
      hosts:
        netbox-s1:
          ansible_host: 10.10.0.10
          ansible_user: netbox
        elastic-s1:
          ansible_host: 10.10.0.20
          ansible_user: elastic
    site2:
      hosts:
        bastion-s2:
          ansible_host: 5.135.202.79
          ansible_port: 2222
          ansible_user: bastion
        web-s2:
          ansible_host: 10.20.0.20
          ansible_user: web
