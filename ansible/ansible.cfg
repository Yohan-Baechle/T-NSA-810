[defaults]
inventory = inventory/hosts.yml
roles_path = roles
retry_files_enabled = False
host_key_checking = False
private_key_file = ~/.ssh/cia_ansible
# vault_password_file = vault_password.txt

[ssh_connection]
# Le bastion (seule entrée publique) est joint en direct sur son port public ;
# le rebond ProxyJump vers les VM internes est défini par host dans l'inventaire.
ssh_args = -o StrictHostKeyChecking=no
pipelining = True

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False
